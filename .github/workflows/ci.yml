name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Format check
        run: python -m ruff format --check .

      - name: Lint
        run: python -m ruff check .

      - name: Typecheck
        run: python -m mypy

      - name: Unit tests
        run: python -m pytest tests/unit

      - name: Migration/schema artifact check
        run: python scripts/db.py check

      - name: Security/static check placeholder
        run: |
          echo "TODO(Phase 19 - SRE): add secret scanning, dependency scanning, and security static analysis gates."
